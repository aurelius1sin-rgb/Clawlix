<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>For Lixuan — A Claw Machine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Dancing+Script:wght@500;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{
    --pink:#ff9ec2; --pink-deep:#ff7aa8; --mint:#aee9cf; --mint-deep:#86d9b4;
    --plum-deep:#2a2030; --rose:#ff7aa8; --gold:#ffd98a; --cream:#fff7f1; --ink:#5a2740;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;overflow:hidden;overscroll-behavior:none;}
  body{
    font-family:system-ui,-apple-system,sans-serif;color:var(--cream);
    background:radial-gradient(125% 90% at 50% -10%, #ffe3ef 0%, #ffeef4 38%, #e4f6ec 100%);
    user-select:none;-webkit-user-select:none;touch-action:manipulation;
  }
  #app{height:100dvh;height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;
    padding:max(8px,env(safe-area-inset-top)) 10px max(10px,env(safe-area-inset-bottom));}
  .cabinet{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;border-radius:26px;padding:10px 10px 0;
    background:linear-gradient(180deg,#ffd0e2,#ffc2d8 60%,#ffb8d0);border:2px solid #b6ead4;
    box-shadow:0 0 0 2px rgba(255,255,255,.5) inset,0 0 34px rgba(255,150,190,.5),0 18px 40px rgba(180,120,150,.35);position:relative;}
  .marquee{text-align:center;padding:8px 6px 10px;position:relative;border-radius:16px;margin-bottom:8px;
    background:linear-gradient(180deg,#ff9cc2,#ff7aa8);box-shadow:0 0 18px rgba(255,140,180,.6),0 4px 10px rgba(255,255,255,.3) inset;}
  .marquee .title{font-family:'Press Start 2P',monospace;font-size:clamp(9px,3.3vw,13px);color:#fff;letter-spacing:.5px;line-height:1.55;
    text-shadow:0 0 8px rgba(255,255,255,.55),0 2px 0 #d65a86;}
  .marquee .subtitle{font-family:'Dancing Script',cursive;font-weight:700;font-size:clamp(15px,5.2vw,21px);color:#fff6fb;margin-top:3px;
    text-shadow:0 1px 4px rgba(200,80,130,.6);}
  .bulbs{position:absolute;inset:4px;border-radius:13px;pointer-events:none;}
  .bulbs i{position:absolute;width:6px;height:6px;border-radius:50%;margin-left:-3px;background:#fff;
    box-shadow:0 0 6px #fff,0 0 10px #b6ead4;animation:blink 1.1s linear infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  .screen{flex:1 1 auto;min-height:0;position:relative;display:flex;}
  .window{flex:1;position:relative;border-radius:14px;overflow:hidden;background:#070512;border:3px solid #120a22;
    box-shadow:0 0 0 3px rgba(255,160,200,.18),0 10px 24px rgba(0,0,0,.5) inset;}
  #game{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .glass{position:absolute;inset:0;pointer-events:none;mix-blend-mode:screen;
    background:linear-gradient(120deg,rgba(255,255,255,.10) 0%,rgba(255,255,255,0) 26%),linear-gradient(300deg,rgba(255,255,255,.05) 0%,rgba(255,255,255,0) 30%);}
  .flash{position:absolute;left:0;right:0;top:36%;text-align:center;font-family:'Press Start 2P',monospace;font-size:clamp(11px,4vw,16px);
    color:var(--gold);text-shadow:0 0 14px var(--gold),0 0 4px #fff;opacity:0;transform:scale(.7);pointer-events:none;}
  .flash.show{animation:flashpop 1.7s ease-out;}
  @keyframes flashpop{0%{opacity:0;transform:scale(.6)}15%{opacity:1;transform:scale(1.06)}72%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.12)}}
  .hint{position:absolute;left:50%;bottom:12px;transform:translateX(-50%);text-align:center;font-size:12.5px;line-height:1.6;color:#ffe7f0;
    background:rgba(15,6,20,.66);backdrop-filter:blur(4px);padding:9px 16px;border-radius:999px;border:1px solid rgba(255,160,200,.3);
    transition:opacity .5s;max-width:90%;}
  .hint b{color:var(--gold);}
  .hint.gone{opacity:0;}
  .deck{display:flex;align-items:center;gap:10px;padding:8px 6px 10px;}
  .tries{font-family:'Press Start 2P',monospace;font-size:9px;color:#ffd9e6;display:flex;align-items:center;gap:6px;white-space:nowrap;}
  .tries span{color:var(--gold);font-size:11px;}
  .progress{display:flex;gap:4px;flex:1;justify-content:center;}
  .progress i{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.16);transition:.2s;}
  .progress i.on{background:var(--rose);box-shadow:0 0 7px var(--rose);}
  .prizedoor{font-family:'Press Start 2P',monospace;font-size:8px;color:#1a0c14;background:linear-gradient(180deg,#ffd45e,#f2a93c);
    padding:7px 9px;border-radius:8px;white-space:nowrap;box-shadow:0 2px 0 #b97a1e,0 0 12px rgba(255,200,90,.4);}
  .controls{flex:0 0 auto;height:clamp(184px,30vh,232px);margin-top:10px;position:relative;display:flex;align-items:center;justify-content:space-between;
    padding:0 8px;border-radius:22px;background:linear-gradient(180deg,#cdf0de,#aee3c9);border:2px solid rgba(255,160,195,.5);
    box-shadow:0 -6px 18px rgba(120,170,145,.25) inset,0 10px 26px rgba(150,130,150,.3);touch-action:none;}
  /* Realistic arcade joystick */
  .stick-wrap{position:relative;width:clamp(140px,38vw,168px);height:clamp(150px,40vw,178px);margin-left:6px;perspective:560px;touch-action:none;}
  .stick-base{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);width:120px;height:120px;border-radius:50%;
    background:radial-gradient(circle at 50% 32%,#4a7a64,#2c4a3c 72%);
    box-shadow:0 12px 22px rgba(80,110,95,.5),inset 0 7px 16px rgba(20,40,32,.6),0 0 0 7px rgba(255,255,255,.35),0 0 0 9px rgba(255,160,195,.45);}
  .stick-base::after{content:"";position:absolute;left:50%;top:50%;width:62px;height:62px;transform:translate(-50%,-50%);border-radius:50%;
    background:radial-gradient(circle at 50% 40%,#39604e,#22382e);box-shadow:inset 0 4px 10px rgba(15,30,24,.7);}
  .stick{position:absolute;left:50%;bottom:62px;transform-origin:bottom center;transform:translateX(-50%) rotateX(0deg) rotateY(0deg);
    transform-style:preserve-3d;transition:transform .13s cubic-bezier(.2,.8,.3,1.5);will-change:transform;}
  .shaft{width:22px;height:64px;border-radius:11px;background:linear-gradient(90deg,#535b69 0%,#eef1f6 44%,#aab2bf 66%,#535b69 100%);
    box-shadow:0 8px 12px rgba(0,0,0,.45);}
  .ball-top{position:absolute;left:50%;top:-30px;transform:translateX(-50%);width:60px;height:60px;border-radius:50%;
    background:radial-gradient(circle at 36% 28%,#ffd0e0,#ff8fb3 55%,#ff6f9e);
    box-shadow:0 8px 16px rgba(120,60,90,.4),inset 0 4px 6px rgba(255,255,255,.7),0 0 20px rgba(255,150,190,.55);}
  .stick-label{position:absolute;left:50%;bottom:-2px;transform:translateX(-50%);font-family:'Press Start 2P',monospace;font-size:7px;color:rgba(70,110,90,.8);white-space:nowrap;}
  /* Drop button */
  .dropbtn{width:clamp(120px,31vw,142px);height:clamp(120px,31vw,142px);margin-right:8px;border:none;border-radius:50%;cursor:pointer;
    font-family:'Press Start 2P',monospace;font-size:clamp(12px,3.6vw,15px);color:#fff;letter-spacing:1px;
    background:radial-gradient(circle at 42% 32%,#ffb3cd,#ff85ad 55%,#ff6f9e);
    box-shadow:0 8px 0 #e26491,0 10px 22px rgba(150,90,120,.4),0 0 22px rgba(255,150,190,.55),0 3px 6px rgba(255,255,255,.55) inset;
    text-shadow:0 2px 0 #e26491;transition:transform .06s,box-shadow .06s;animation:invite 2.4s ease-in-out infinite;}
  @keyframes invite{0%,100%{box-shadow:0 8px 0 #e26491,0 10px 22px rgba(150,90,120,.4),0 0 18px rgba(255,150,190,.45),0 3px 6px rgba(255,255,255,.55) inset}50%{box-shadow:0 8px 0 #e26491,0 10px 22px rgba(150,90,120,.4),0 0 32px rgba(255,170,205,.85),0 3px 6px rgba(255,255,255,.55) inset}}
  .dropbtn:active,.dropbtn.press{transform:translateY(6px);box-shadow:0 2px 0 #e26491,0 4px 10px rgba(150,90,120,.4),0 0 26px rgba(255,170,205,.8),0 2px 4px rgba(255,255,255,.5) inset;animation:none;}
  .dropbtn:disabled{filter:saturate(.5) brightness(.8);animation:none;}
  .mute{position:absolute;top:8px;right:12px;width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,160,200,.3);
    background:rgba(15,6,20,.6);color:#ffd9e6;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  /* Prize modal */
  .modal{position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;padding:22px;
    background:rgba(10,4,16,.64);backdrop-filter:blur(7px);animation:fade .35s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal-card{width:100%;max-width:330px;border-radius:22px;overflow:hidden;background:var(--cream);color:var(--ink);
    box-shadow:0 24px 60px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.4) inset;animation:rise .4s cubic-bezier(.2,.9,.3,1.2);}
  @keyframes rise{from{transform:translateY(26px) scale(.96);opacity:0}to{transform:none;opacity:1}}
  .membar{height:6px;width:100%;background:var(--rose);}
  .eyebrow2{font-family:'Press Start 2P',monospace;font-size:8px;letter-spacing:.5px;color:#c0537a;text-align:center;margin:14px 20px 0;}
  .memimg{position:relative;width:100%;aspect-ratio:4/3;overflow:hidden;background:#eadfd3;margin-top:10px;}
  .memimg img{width:100%;height:100%;object-fit:cover;display:block;}
  .modal-card p{font-family:'Cormorant Garamond',serif;font-size:18.5px;line-height:1.5;margin:14px 22px 16px;color:#4a2230;text-align:center;}
  .modal-card button,.notebtn{display:block;width:calc(100% - 40px);margin:0 20px 20px;padding:13px;border:none;border-radius:12px;cursor:pointer;
    font-family:'Press Start 2P',monospace;font-size:10px;letter-spacing:.5px;color:#fff;background:linear-gradient(180deg,#ff9ec2,#ff6f9e);
    box-shadow:0 4px 0 #e26491,0 6px 14px rgba(255,150,190,.4);transition:transform .06s,box-shadow .06s;}
  .modal-card button:active,.notebtn:active{transform:translateY(4px);box-shadow:0 1px 0 #e26491;}
  /* Main note overlay */
  .note{position:fixed;inset:0;z-index:50;overflow-y:auto;display:flex;align-items:center;justify-content:center;padding:22px 18px;
    background:radial-gradient(120% 90% at 50% 0%,#ffd9e8,#cdebd9);animation:fade .5s ease;}
  .note-card{position:relative;width:100%;max-width:382px;padding:34px 26px 26px;border-radius:8px;color:#43232f;
    background:repeating-linear-gradient(0deg,rgba(180,120,90,.05) 0 27px,rgba(180,120,90,.09) 27px 28px),linear-gradient(180deg,#fffaf2,#fdeede);
    box-shadow:0 30px 70px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.5) inset;animation:rise .6s cubic-bezier(.2,.9,.3,1.1);}
  .note-card .eyebrow{font-family:'Press Start 2P',monospace;font-size:8px;letter-spacing:1px;color:#c0537a;text-align:center;margin-bottom:10px;}
  .note-card h1{font-family:'Dancing Script',cursive;font-weight:700;font-size:38px;text-align:center;margin:0 0 4px;color:#b8265c;text-shadow:0 1px 0 #fff;}
  .note-card .lead{font-family:'Dancing Script',cursive;font-size:22px;text-align:center;color:#a23a63;margin:0 0 18px;}
  .note-card p{font-family:'Cormorant Garamond',serif;font-size:19px;line-height:1.62;margin:0 0 14px;color:#4a2730;}
  .note-card .sign{font-family:'Poppins',sans-serif;font-weight:600;font-size:18px;color:#b8265c;text-align:right;margin-top:18px;line-height:1.3;}
  .note-card .note-title{font-family:'Poppins',sans-serif;font-weight:700;font-size:24px;text-align:center;color:#b8265c;margin:6px 0 2px;letter-spacing:.2px;}
  .note-card .note-msg{font-family:'Poppins',sans-serif;font-weight:600;font-size:18px;text-align:center;color:#5a2740;margin:10px 14px 2px;line-height:1.5;}
  .note-illus{display:block;margin:6px auto 14px;width:112px;height:112px;}
  .seal{position:absolute;top:-22px;left:50%;transform:translateX(-50%);width:52px;height:52px;border-radius:50%;
    background:radial-gradient(circle at 40% 35%,#ffb0cd,#ff6f9e);color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;
    box-shadow:0 6px 16px rgba(255,150,190,.55),0 2px 3px rgba(255,255,255,.5) inset;}
  .hearts{position:fixed;inset:0;pointer-events:none;z-index:49;overflow:hidden;}
  .hearts span{position:absolute;bottom:-30px;font-size:18px;color:#ff7ea6;opacity:.85;animation:floatUp linear forwards;}
  @keyframes floatUp{to{transform:translateY(-115vh) rotate(40deg);opacity:0;}}
  .hidden{display:none !important;}
  #loaderr{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;padding:30px;text-align:center;background:var(--plum-deep);}
  #loaderr div{font-family:'Cormorant Garamond',serif;font-size:20px;color:#ffd9e6;line-height:1.5;}
  @media (prefers-reduced-motion:reduce){.bulbs i,.dropbtn{animation:none;}}
</style>
</head>

window.addEventListener('load', function(){
  if (typeof THREE === 'undefined'){ document.getElementById('loaderr').style.display='flex'; return; }

  /* ---------------- Renderer + scene ---------------- */
  const canvas = document.getElementById('game');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color('#2a2230');
  scene.fog = new THREE.Fog('#2a2230', 22, 42);

  const camera = new THREE.PerspectiveCamera(46, 1, 0.1, 100);
  camera.position.set(0, 7.6, 12.6);
  camera.lookAt(0, 1.7, -0.4);

  const BX = 5, BZ = 5, HT = 9;
  const carriageY = HT - 0.25, restY = 6.7, minHeadY = 2.25;
  const CHUTE = { x: BX-1.1, z: BZ-1.1 }, HOME = { x: 0, z: 0 };
  const CIX = BX-2.2, CIZ = BZ-2.2; // inner faces of the corner barrier (pile side)

  /* ---------------- Lights ---------------- */
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const key = new THREE.DirectionalLight(0xfff0f5, 0.95);
  key.position.set(6, 15, 9); key.castShadow = true;
  key.shadow.mapSize.set(1024, 1024);
  key.shadow.camera.near = 1; key.shadow.camera.far = 44;
  key.shadow.camera.left = -10; key.shadow.camera.right = 10;
  key.shadow.camera.top = 10; key.shadow.camera.bottom = -10;
  key.shadow.bias = -0.0008;
  scene.add(key);
  const neonA = new THREE.PointLight(0xffaed0, 0.85, 46); neonA.position.set(-6, 7, 7); scene.add(neonA);
  const neonB = new THREE.PointLight(0x9ee9c6, 0.75, 46); neonB.position.set(7, 6, -3); scene.add(neonB);

  /* ---------------- Cabinet ---------------- */
  const floor = new THREE.Mesh(new THREE.BoxGeometry(BX*2, 0.6, BZ*2),
    new THREE.MeshStandardMaterial({ color:0x3a2e3c, roughness:0.9, metalness:0.1 }));
  floor.position.y = -0.3; floor.receiveShadow = true; scene.add(floor);

  const hole = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.05, 2.2), new THREE.MeshBasicMaterial({ color:0x000000 }));
  hole.position.set(CHUTE.x, 0.02, CHUTE.z); scene.add(hole);
  const recess = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.4, 2.2), new THREE.MeshStandardMaterial({ color:0x05030a, roughness:1 }));
  recess.position.set(CHUTE.x, -0.72, CHUTE.z); scene.add(recess);
  const rim = new THREE.Mesh(new THREE.TorusGeometry(1.02, 0.06, 8, 24),
    new THREE.MeshStandardMaterial({ color:0xffd45e, emissive:0xffb000, emissiveIntensity:0.7, roughness:0.4 }));
  rim.rotation.x = Math.PI/2; rim.position.set(CHUTE.x, 0.06, CHUTE.z); scene.add(rim);
  // corner barrier guard walls (keep loose prizes off the chute)
  const guardMat = new THREE.MeshPhongMaterial({ color:0x9ee9c6, transparent:true, opacity:0.32, shininess:80, side:THREE.DoubleSide });
  const guardH = 1.6;
  const gw1 = new THREE.Mesh(new THREE.BoxGeometry(0.16, guardH, (BZ-CIZ)+0.16), guardMat);
  gw1.position.set(CIX, guardH/2, (CIZ+BZ)/2); scene.add(gw1);
  const gw2 = new THREE.Mesh(new THREE.BoxGeometry((BX-CIX)+0.16, guardH, 0.16), guardMat);
  gw2.position.set((CIX+BX)/2, guardH/2, CIZ); scene.add(gw2);
  // bright edge caps on the guard rails
  const capMat = new THREE.MeshStandardMaterial({ color:0xffaed0, emissive:0xff85ad, emissiveIntensity:0.7, roughness:0.4 });
  const ec1 = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.16, (BZ-CIZ)+0.2), capMat); ec1.position.set(CIX, guardH, (CIZ+BZ)/2); scene.add(ec1);
  const ec2 = new THREE.Mesh(new THREE.BoxGeometry((BX-CIX)+0.2, 0.16, 0.2), capMat); ec2.position.set((CIX+BX)/2, guardH, CIZ); scene.add(ec2);

  const glassMat = new THREE.MeshPhongMaterial({ color:0xffd9ec, transparent:true, opacity:0.05, shininess:90, side:THREE.DoubleSide });
  function addWall(w,h,d,x,y,z){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d), glassMat); m.position.set(x,y,z); scene.add(m); }
  addWall(BX*2, HT, 0.12, 0, HT/2, -BZ);
  addWall(0.12, HT, BZ*2, -BX, HT/2, 0);
  addWall(0.12, HT, BZ*2,  BX, HT/2, 0);
  addWall(BX*2, HT, 0.12, 0, HT/2,  BZ);

  const frameMat = new THREE.MeshStandardMaterial({ color:0x16121f, roughness:0.5, metalness:0.7 });
  function beam(w,h,d,x,y,z,mat){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat||frameMat); m.position.set(x,y,z); scene.add(m); return m; }
  const tt=0.34;
  for (const sx of [-1,1]) for (const sz of [-1,1]) beam(tt, HT+0.5, tt, sx*BX, HT/2, sz*BZ);
  beam(BX*2+tt, tt, tt, 0, 0, -BZ); beam(BX*2+tt, tt, tt, 0, 0, BZ);
  beam(tt, tt, BZ*2+tt, -BX, 0, 0); beam(tt, tt, BZ*2+tt, BX, 0, 0);
  const neonMat = new THREE.MeshStandardMaterial({ color:0xffaed0, emissive:0xff85ad, emissiveIntensity:0.85, roughness:0.4 });
  const neonMatG = new THREE.MeshStandardMaterial({ color:0x9ee9c6, emissive:0x6fd9ad, emissiveIntensity:0.85, roughness:0.4 });
  beam(BX*2+tt, tt, tt, 0, HT, -BZ, neonMat); beam(BX*2+tt, tt, tt, 0, HT, BZ, neonMat);
  beam(tt, tt, BZ*2+tt, -BX, HT, 0, neonMatG); beam(tt, tt, BZ*2+tt, BX, HT, 0, neonMatG);

  /* ---------------- Gantry + claw ---------------- */
  const metal = new THREE.MeshStandardMaterial({ color:0xccd2dc, roughness:0.32, metalness:0.85 });
  const railMat = new THREE.MeshStandardMaterial({ color:0x3a3f4a, roughness:0.5, metalness:0.7 });
  const xRail = beam(BX*2, 0.18, 0.18, 0, carriageY, 0, railMat);
  const carriage = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.4, 0.8), metal); carriage.castShadow = true; scene.add(carriage);
  const cable = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,1,8),
    new THREE.MeshStandardMaterial({ color:0x888f9b, roughness:0.6 })); scene.add(cable);

  const claw = new THREE.Group(); scene.add(claw);
  const hub = new THREE.Mesh(new THREE.CylinderGeometry(0.45,0.6,0.5,18), metal); hub.castShadow = true; claw.add(hub);
  const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.2,0.5,12), metal); cap.position.y = 0.45; claw.add(cap);
  const prongs = [];
  for (let i=0;i<3;i++){
    const pivot = new THREE.Group(); pivot.rotation.y = i*Math.PI*2/3;
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.18,1.15,0.34), metal);
    arm.castShadow = true; arm.position.set(0, -0.55, 0.48);
    const tip = new THREE.Mesh(new THREE.BoxGeometry(0.18,0.55,0.3), metal);
    tip.position.set(0, -0.52, 0.02); tip.rotation.x = -0.7; arm.add(tip);
    pivot.add(arm); claw.add(pivot); prongs.push(pivot);
  }

  // aim ring on the floor: shows exactly where the claw is pointing
  const aimRing = new THREE.Mesh(
    new THREE.TorusGeometry(0.95, 0.09, 8, 28),
    new THREE.MeshStandardMaterial({ color:0xfff0f5, emissive:0xff85ad, emissiveIntensity:0.55, roughness:0.4, transparent:true, opacity:0.92 })
  );
  aimRing.rotation.x = Math.PI/2;
  scene.add(aimRing);
  const aimDot = new THREE.Mesh(
    new THREE.CircleGeometry(0.12, 16),
    new THREE.MeshBasicMaterial({ color:0xff85ad })
  );
  aimDot.rotation.x = -Math.PI/2;
  scene.add(aimDot);
  /* ---------------- Prize balls ---------------- */
  const balls = [];
  const BR = 0.85;
  const ballGeo = new THREE.SphereGeometry(BR, 20, 16);
  // pastel pink/green candy palette (one per prize photo; edit freely)
  const BALL_COLORS = ['#ff9ec2','#ff7ba6','#ffc2d9','#a8e6cf','#86d9b4','#c8f4dd','#d6c2f0'];
  function ballColor(pi){ return BALL_COLORS[pi % BALL_COLORS.length]; }
  function ballMat(hex){ return new THREE.MeshStandardMaterial({ color:hex, roughness:0.22, metalness:0.1 }); }
  function spawnBall(prizeIndex){
    const pi = (prizeIndex==null) ? (Math.random()*PRIZES.length|0) : prizeIndex;
    const mesh = new THREE.Mesh(ballGeo, ballMat(ballColor(pi)));
    mesh.castShadow = true; mesh.receiveShadow = true; scene.add(mesh);
    const b = { mesh, pos:new THREE.Vector3(), vel:new THREE.Vector3(), r:BR, prize:pi, special:false, captured:false, delivering:false };
    b.pos.set((Math.random()*2-1)*(BX-1.2), 5+Math.random()*3.5, (Math.random()*2-1)*(BZ-1.2));
    mesh.position.copy(b.pos); balls.push(b); return b;
  }
  function removeBall(b){ scene.remove(b.mesh); const i=balls.indexOf(b); if(i>=0) balls.splice(i,1); }

  /* ---------------- State ---------------- */
  let gx=0, gz=0, gvx=0, gvz=0, headY=restY, o=0.7;
  let state='IDLE', held=null, committedTarget=null, success=false, failType=null, isSpecialTry=false;
  let releasedFlag=false, moveStartX=0, moveStartZ=0, specialBall=null, grabbedDone=false;
  let attempts=0, modalOpen=false, inX=0, inZ=0;
  const SUCCESS_RATE=0.5, G=20, SLOP=0.012;

  /* ---------------- Physics ---------------- */
  function physics(dt){
    for (const b of balls){
      if (b.captured) continue;
      if (b.delivering){ b.vel.y -= G*dt; b.pos.addScaledVector(b.vel, dt); b.mesh.position.copy(b.pos); continue; }
      if (b.sleep) continue;
      b.vel.y -= G*dt; b.pos.addScaledVector(b.vel, dt);
      if (b.pos.x < -BX+b.r){ b.pos.x=-BX+b.r; if(b.vel.x<0) b.vel.x*=-0.3; }
      if (b.pos.x >  BX-b.r){ b.pos.x= BX-b.r; if(b.vel.x>0) b.vel.x*=-0.3; }
      if (b.pos.z < -BZ+b.r){ b.pos.z=-BZ+b.r; if(b.vel.z<0) b.vel.z*=-0.3; }
      if (b.pos.z >  BZ-b.r){ b.pos.z= BZ-b.r; if(b.vel.z>0) b.vel.z*=-0.3; }
      // corner barrier: keep loose prizes out of the chute square
      if (b.pos.x > CIX-b.r && b.pos.z > CIZ-b.r){
        const penX = b.pos.x-(CIX-b.r), penZ = b.pos.z-(CIZ-b.r);
        if (penX < penZ){ b.pos.x = CIX-b.r; if(b.vel.x>0) b.vel.x*=-0.3; }
        else { b.pos.z = CIZ-b.r; if(b.vel.z>0) b.vel.z*=-0.3; }
      }
      if (b.pos.y < b.r){ b.pos.y=b.r; if(b.vel.y<0) b.vel.y*=-0.2; b.vel.x*=0.78; b.vel.z*=0.78; }
    }
    for (let it=0; it<2; it++){
      for (let i=0;i<balls.length;i++){
        const a=balls[i]; if(a.captured||a.delivering) continue;
        for (let j=i+1;j<balls.length;j++){
          const c=balls[j]; if(c.captured||c.delivering) continue;
          const dx=c.pos.x-a.pos.x, dy=c.pos.y-a.pos.y, dz=c.pos.z-a.pos.z;
          const rr=a.r+c.r, d2=dx*dx+dy*dy+dz*dz;
          if (d2<rr*rr && d2>1e-5){
            const d=Math.sqrt(d2), over=rr-d;
            const push=Math.max(0, over-SLOP)*0.5;
            if (push>0 || over>0.05){ a.sleep=false; c.sleep=false; }
            if (push>0){
              const nx=dx/d, ny=dy/d, nz=dz/d;
              a.pos.x-=nx*push; a.pos.y-=ny*push; a.pos.z-=nz*push;
              c.pos.x+=nx*push; c.pos.y+=ny*push; c.pos.z+=nz*push;
              const rel=(c.vel.x-a.vel.x)*nx+(c.vel.y-a.vel.y)*ny+(c.vel.z-a.vel.z)*nz;
              if (rel<0){ const imp=rel*0.5; a.vel.x+=nx*imp; a.vel.y+=ny*imp; a.vel.z+=nz*imp; c.vel.x-=nx*imp; c.vel.y-=ny*imp; c.vel.z-=nz*imp; }
            }
          }
        }
      }
    }
    for (const b of balls){
      if (b.captured||b.delivering) continue;
      if (b.sleep){ b.mesh.position.copy(b.pos); continue; }
      b.vel.multiplyScalar(0.985);
      if (b.vel.lengthSq() < 0.0008){ b.vel.set(0,0,0); b.still=(b.still||0)+1; } else b.still=0;
      if (b.still > 16) b.sleep = true;
      b.mesh.position.copy(b.pos);
    }
  }
  function clawPush(){
    const clawR=0.78, prongBottom=headY-1.7;
    for (const b of balls){
      if (b.captured||b.delivering||b===committedTarget) continue;
      if (prongBottom > b.pos.y + b.r) continue; // claw hasn't reached this ball's level yet
      const dx=b.pos.x-gx, dz=b.pos.z-gz, d=Math.hypot(dx,dz);
      if (d < clawR+b.r && d>1e-3){
        const push=(clawR+b.r-d)*0.5;
        b.pos.x+=dx/d*push; b.pos.z+=dz/d*push; b.vel.x+=dx/d*1.1; b.vel.z+=dz/d*1.1; b.sleep=false;
      }
    }
  }
  function findTarget(maxR){
    let best=null, bd=1e9;
    for (const b of balls){
      if (b.captured||b.delivering||b.special) continue;
      const dx=b.pos.x-gx, dz=b.pos.z-gz, d=Math.hypot(dx,dz);
      if (d<maxR && d<bd){ bd=d; best=b; }
    }
    return best;
  }
  function grabSpecial(){
    const mat=new THREE.MeshStandardMaterial({ color:0xffd23f, roughness:0.12, metalness:0.5, emissive:0xffb000, emissiveIntensity:0.75 });
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(1.0,22,18), mat); mesh.castShadow=true; scene.add(mesh);
    const b={ mesh, pos:new THREE.Vector3(gx,headY-1.6,gz), vel:new THREE.Vector3(), r:1.0, prize:-1, special:true, captured:true, delivering:false };
    mesh.position.copy(b.pos); balls.push(b); specialBall=b; return b;
  }

  /* ---------------- Sequence ---------------- */
  function doDrop(){
    if (state!=='IDLE' || modalOpen) return;
    attempts++;
    isSpecialTry = (attempts % 10 === 0);
    committedTarget = isSpecialTry ? null : findTarget(1.5); // lock onto the prize you aimed at
    inX=0; inZ=0; gvx=0; gvz=0; state='DESCEND';
    sound('drop'); haptic(20);
    if (isSpecialTry) flashSpecial();
  }
  function enterGrab(){ state='GRAB'; grabbedDone=false; sound('grab'); haptic(12); }
  function finalizeGrab(){
    if (isSpecialTry){ const sb=grabSpecial(); held=sb; success=true; failType=null; haptic([20,40,20]); sound('special'); }
    else if (committedTarget && !committedTarget.delivering){
      success = Math.random()<SUCCESS_RATE;
      if (success){ held=committedTarget; held.captured=true; failType=null; haptic(18); }
      else { failType = Math.random()<0.5?'slip':'partway';
        if (failType==='partway'){ held=committedTarget; held.captured=true; } else { held=null; sound('miss'); } }
    } else { held=null; success=false; failType=null; sound('miss'); }
  }
  function onDelivered(b){
    if (b.special) showNote(); else showPrize(b.prize);
    removeBall(b);
    if (b.special) specialBall=null;
    spawnBall();
  }
  function prongTarget(){
    if (state==='GRAB') return 0.0;
    if (state==='DESCEND') return 0.85;
    if (state==='ASCEND'||state==='MOVE') return held?0.06:0.7;
    if (state==='RELEASE') return 0.85;
    return 0.7;
  }

  function update(dt){
    const f = Math.min(dt*60, 2);
    o += (prongTarget()-o)*Math.min(0.22*f,1);
    const spread = 0.42 - o*0.9;
    for (const p of prongs) p.rotation.x = spread;

    if (state==='IDLE'){
      let ix=inX, iz=inZ;
      if (Math.hypot(ix,iz) < 0.14){ ix=0; iz=0; } // small dead zone
      gx += ix*0.155*f; gz += iz*0.155*f; // move directly while pushed, stop on release
      const lim=BX-0.9;
      if (gx<-lim) gx=-lim; if (gx>lim) gx=lim;
      if (gz<-lim) gz=-lim; if (gz>lim) gz=lim;
    }

    switch (state){
      case 'DESCEND': {
        if (committedTarget){ gx += (committedTarget.pos.x-gx)*Math.min(0.12*f,1); gz += (committedTarget.pos.z-gz)*Math.min(0.12*f,1); }
        headY -= 0.13*f; clawPush();
        const reach = committedTarget && (headY-1.5) <= (committedTarget.pos.y + committedTarget.r);
        if (reach || headY <= minHeadY) enterGrab();
        break;
      }
      case 'GRAB': {
        if (o < 0.12 && !grabbedDone){ finalizeGrab(); grabbedDone=true; state='ASCEND'; }
        break;
      }
      case 'ASCEND': {
        headY += 0.12*f;
        if (headY >= restY){ headY=restY; if(held){ moveStartX=gx; moveStartZ=gz; state='MOVE'; } else state='RESET'; }
        break;
      }
      case 'MOVE': {
        gx += (CHUTE.x-gx)*Math.min(0.09*f,1); gz += (CHUTE.z-gz)*Math.min(0.09*f,1);
        if (failType==='partway' && held){
          const total=Math.hypot(CHUTE.x-moveStartX, CHUTE.z-moveStartZ)||1;
          const done=Math.hypot(gx-moveStartX, gz-moveStartZ)/total;
          if (done>0.5){ const b=held; b.captured=false; b.delivering=false; b.sleep=false; b.still=0; b.vel.set((Math.random()-0.5)*2,-1,(Math.random()-0.5)*2); held=null; failType='dropped'; sound('miss'); haptic(30); }
        }
        if (Math.hypot(CHUTE.x-gx, CHUTE.z-gz) < 0.12){ gx=CHUTE.x; gz=CHUTE.z; if(held){ state='RELEASE'; releasedFlag=false; } else state='RESET'; }
        break;
      }
      case 'RELEASE': {
        if (!releasedFlag && o>0.55){ held.captured=false; held.delivering=true; held.vel.set(0,-1.2,0); sound(isSpecialTry?'special':'win'); releasedFlag=true; held=null; }
        if (o>0.8) state='DELIVER';
        break;
      }
      case 'DELIVER': {
        let d=null; for(const b of balls){ if(b.delivering){ d=b; break; } }
        if (d){ if (d.pos.y < -1.4){ onDelivered(d); state='RESET'; } } else state='RESET';
        break;
      }
      case 'RESET': {
        gx += (HOME.x-gx)*Math.min(0.1*f,1); gz += (HOME.z-gz)*Math.min(0.1*f,1);
        if (Math.hypot(HOME.x-gx, HOME.z-gz) < 0.15){ gx=HOME.x; gz=HOME.z; state='IDLE'; isSpecialTry=false; failType=null; success=false; grabbedDone=false; committedTarget=null; }
        break;
      }
    }

    if (held && held.captured){ held.pos.set(gx, headY-1.6, gz); held.mesh.position.copy(held.pos); }

    claw.position.set(gx, headY, gz);
    carriage.position.set(gx, carriageY, gz);
    xRail.position.z = gz;
    const topY = headY + 0.7, len = Math.max(0.1, carriageY - topY);
    cable.position.set(gx, (carriageY+topY)/2, gz); cable.scale.y = len;

    const aiming = (state==='IDLE');
    aimRing.visible = aiming; aimDot.visible = aiming;
    aimRing.position.set(gx, 0.06, gz); aimDot.position.set(gx, 0.07, gz);

    const t=performance.now()/1000;
    neonA.intensity = 0.7 + Math.sin(t*1.6)*0.18;
    neonB.intensity = 0.6 + Math.sin(t*1.3+1.5)*0.16;
  }

  /* ---------------- Resize + loop ---------------- */
  function resize(){
    const w=canvas.clientWidth, h=canvas.clientHeight;
    if (!w || !h) return;
    renderer.setSize(w, h, false);
    camera.aspect = w/h; camera.updateProjectionMatrix();
  }
  let last=performance.now();
  function loop(now){
    requestAnimationFrame(loop);
    let dt=(now-last)/1000; last=now; if(dt>1/30) dt=1/30; if(dt<=0) dt=1/60;
    update(dt); physics(dt); renderer.render(scene, camera);
  }

  /* ---------------- Flash ---------------- */
  function flashSpecial(){ const fl=document.getElementById('flash'); fl.classList.remove('show'); void fl.offsetWidth; fl.classList.add('show'); }

  /* ---------------- Prize modal ---------------- */
  function showPrize(pi){
    const p=PRIZES[pi];
    document.getElementById('memBar').style.background=ballColor(pi);
    document.getElementById('memCap').textContent='i love you sm bby';
    document.getElementById('memImgEl').src=p.img;
    document.getElementById('prizeModal').classList.remove('hidden'); modalOpen=true; haptic(15);
  }
  document.getElementById('memClose').addEventListener('click', ()=>{ document.getElementById('prizeModal').classList.add('hidden'); modalOpen=false; });

  /* ---------------- Main note ---------------- */
  const heartsBox = document.getElementById('hearts');
  function showNote(){ document.getElementById('mainNote').classList.remove('hidden'); modalOpen=true; haptic([30,60,30]); rainHearts(); }
  function rainHearts(){
    heartsBox.innerHTML='';
    const glyphs=['\u2764\uFE0F','\uD83D\uDC95','\uD83D\uDC96','\uD83D\uDC9E'];
    for (let i=0;i<26;i++){
      const s=document.createElement('span'); s.textContent=glyphs[i%glyphs.length];
      s.style.left=Math.random()*100+'%'; s.style.fontSize=(13+Math.random()*18)+'px';
      const dur=4+Math.random()*4; s.style.animationDuration=dur+'s'; s.style.animationDelay=(Math.random()*1.5)+'s';
      heartsBox.appendChild(s); setTimeout(()=>s.remove(), (dur+2)*1000);
    }
  }
  document.getElementById('noteClose').addEventListener('click', ()=>{ document.getElementById('mainNote').classList.add('hidden'); modalOpen=false; heartsBox.innerHTML=''; });

  /* ---------------- Joystick (realistic tilt) ---------------- */
  const stickWrap = document.getElementById('stickWrap');
  const stick = document.getElementById('stick');
  let stickId=null;
  stickWrap.addEventListener('pointerdown', e=>{ stickId=e.pointerId; stickWrap.setPointerCapture(e.pointerId); ensureAudio(); hideHint(); moveStick(e); });
  stickWrap.addEventListener('pointermove', e=>{ if(e.pointerId===stickId) moveStick(e); });
  stickWrap.addEventListener('pointerup', endStick);
  stickWrap.addEventListener('pointercancel', endStick);
  function moveStick(e){
    const r=stickWrap.getBoundingClientRect();
    const cx=r.left+r.width/2, cy=r.top+r.height*0.62;
    let dx=e.clientX-cx, dy=e.clientY-cy;
    const max=Math.min(r.width,r.height)*0.34, dist=Math.hypot(dx,dy);
    if (dist>max){ dx=dx/dist*max; dy=dy/dist*max; }
    inX=dx/max; inZ=dy/max;
    stick.style.transform='translateX(-50%) rotateZ('+(-(dx/max)*18)+'deg) rotateX('+((dy/max)*18)+'deg)';
  }
  function endStick(){ stickId=null; inX=0; inZ=0; stick.style.transform='translateX(-50%) rotateZ(0deg) rotateX(0deg)'; }

  /* ---------------- Drop + keyboard ---------------- */
  const dropBtn = document.getElementById('dropBtn');
  dropBtn.addEventListener('pointerdown', e=>{ e.preventDefault(); ensureAudio(); hideHint(); dropBtn.classList.add('press'); doDrop(); });
  const releasePress = ()=>dropBtn.classList.remove('press');
  dropBtn.addEventListener('pointerup', releasePress);
  dropBtn.addEventListener('pointercancel', releasePress);
  dropBtn.addEventListener('pointerleave', releasePress);
  window.addEventListener('keydown', e=>{
    if (e.repeat) return;
    if (e.key==='ArrowLeft') inX=-1; else if (e.key==='ArrowRight') inX=1;
    else if (e.key==='ArrowUp') inZ=-1; else if (e.key==='ArrowDown') inZ=1;
    else if (e.code==='Space'){ e.preventDefault(); ensureAudio(); hideHint(); doDrop(); }
  });
  window.addEventListener('keyup', e=>{
    if (e.key==='ArrowLeft'||e.key==='ArrowRight') inX=0;
    if (e.key==='ArrowUp'||e.key==='ArrowDown') inZ=0;
  });
  function hideHint(){ const h=document.getElementById('hint'); if (h && !h.classList.contains('gone')) h.classList.add('gone'); }

  /* ---------------- Audio ---------------- */
  let actx=null, muted=false;
  function ensureAudio(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==='suspended') actx.resume(); }
  function blip(freq,dur,type,vol,slideTo){
    if(!actx||muted) return;
    const osc=actx.createOscillator(), g=actx.createGain();
    osc.type=type||'sine'; osc.frequency.value=freq;
    if(slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, actx.currentTime+dur);
    g.gain.value=vol||0.07; g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
    osc.connect(g).connect(actx.destination); osc.start(); osc.stop(actx.currentTime+dur+0.02);
  }
  function sound(name){
    if(!actx||muted) return;
    if(name==='drop') blip(440,0.18,'square',0.05,150);
    else if(name==='grab') blip(120,0.12,'sawtooth',0.06,80);
    else if(name==='win') [523,659,784,1047].forEach((fr,i)=>setTimeout(()=>blip(fr,0.16,'triangle',0.06),i*90));
    else if(name==='special') [659,784,988,1319,1568].forEach((fr,i)=>setTimeout(()=>blip(fr,0.2,'triangle',0.06),i*80));
    else if(name==='miss') blip(165,0.22,'sawtooth',0.045,70);
  }
  function haptic(p){ if(navigator.vibrate){ try{ navigator.vibrate(p); }catch(e){} } }

  /* ---------------- Marquee bulbs ---------------- */
  (function(){
    const box=document.getElementById('bulbs'); const half=9;
    for (let i=0;i<half*2;i++){
      const b=document.createElement('i');
      if (i<half){ b.style.top='-1px'; b.style.left=(i/(half-1)*100)+'%'; }
      else { const j=i-half; b.style.bottom='-1px'; b.style.left=(j/(half-1)*100)+'%'; }
      b.style.animationDelay=(i*0.12)+'s'; box.appendChild(b);
    }
  })();

  /* ---------------- Boot ---------------- */
  for (let i=0;i<16;i++) spawnBall(i % PRIZES.length);
  resize();
  if (window.ResizeObserver) new ResizeObserver(resize).observe(canvas);
  window.addEventListener('resize', resize);
  requestAnimationFrame(loop);
});
</script>
</body>
</html>
